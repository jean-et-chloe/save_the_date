<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Jean &amp; Chloé</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0c0a08;
    }

    #landing {
      position: fixed;
      inset: 0;
      cursor: pointer;
      transition: opacity 0.4s ease;
      background-image: url('poster.png');
      background-size: cover;
      background-position: center;
    }

    #landing::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
    }

    #landing.hide {
      opacity: 0;
      pointer-events: none;
    }

    /* Text at ~60% from top — level with door handles */
    #main-text {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.3rem, 6.5vw, 1.9rem);
      color: rgba(245, 235, 210, 0.92);
      letter-spacing: 0.08em;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
      animation: breathe 3s ease-in-out infinite;
    }

    /* Bottom right credit */
    #credit {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom, 16px));
      right: 20px;
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.82rem, 3.5vw, 1rem);
      color: rgba(245, 235, 210, 0.75);
      letter-spacing: 0.06em;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1; }
    }

    #video-wrap {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #video-wrap.show {
      opacity: 1;
      pointer-events: auto;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div id="landing" onclick="play()">
    <p id="main-text">Une invitation vous attend</p>
    <p id="credit">Réalisé par les mariés</p>
  </div>

  <div id="video-wrap">
    <video
      id="v"
      src="VIDEO_FINALE.mp4"
      playsinline
      webkit-playsinline
      preload="metadata"
      disablePictureInPicture
    ></video>
  </div>

  <script>
    function play() {
      document.getElementById('landing').classList.add('hide');
      document.getElementById('video-wrap').classList.add('show');
      document.getElementById('v').play();
    }
  </script>

</body>
</html>
